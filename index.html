<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강릉여행</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:sans-serif;background:#eef9ff}

.header{
  background:linear-gradient(135deg,#5ec8f7,#bcefff);
  color:white;padding:28px;text-align:center
}

.wrap{max-width:760px;margin:auto;padding:16px}

.tabs{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;margin-bottom:16px
}
.tab{
  padding:12px;border:0;border-radius:14px;
  background:white;font-weight:800
}
.tab.active{background:#38bdf2;color:white}

.page{display:none}
.page.active{display:block}

/* 앨범 */
.album-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:10px;
}

.album-card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 6px 16px rgba(0,0,0,.1)
}

.album-thumb{
  width:100%;
  aspect-ratio:1/1;
  background:#dff4ff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.album-thumb img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.album-body{padding:10px}

.album-title{
  font-weight:900;
  font-size:15px;
  margin-bottom:6px;
}

.album-meta{
  font-size:11px;
  color:#168ac3;
  margin-bottom:6px;
}

.album-desc{
  font-size:12px;
  color:#555;
  min-height:32px;
}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-top:8px;
}

.btn{
  text-align:center;
  padding:7px;
  border-radius:10px;
  background:#38bdf2;
  color:white;
  text-decoration:none;
  font-size:11px;
  font-weight:800;
}

.btn.sub{
  background:#eaf8ff;
  color:#168ac3;
}

</style>
</head>

<body>

<div class="header">
  <h2>강릉 여행 🌊</h2>
</div>

<div class="wrap">

<div class="tabs">
  <button class="tab active" onclick="showPage('map',this)">지도</button>
  <button class="tab" onclick="showPage('schedule',this)">시간표</button>
</div>

<div id="map" class="page active">
  <div id="mapList">불러오는 중...</div>
</div>

<div id="schedule" class="page">
  <div id="app">불러오는 중...</div>
</div>

</div>

<script>
const SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTmRUaGP5Z7-onrAOIWTONSfiLi2hjdOAUjObYskf2vs5oKNDj-8D2j5Rsmzj6QrLisXVktZMJsPwvW/pub?output=csv";

let allData=[];

function showPage(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

function parseCSV(t){
  return t.trim().split("\n").map(r=>r.split(","));
}

function placeView(p){
  return "https://search.naver.com/search.naver?query="+encodeURIComponent(p+" 지도");
}

function placeSearch(p){
  return "https://search.naver.com/search.naver?query="+encodeURIComponent(p);
}

function getIcon(type){
  if(type.includes("식당")) return "🍽️";
  if(type.includes("카페")) return "☕";
  return "📍";
}

function load(){
  fetch(SHEET_URL+"&t="+Date.now())
  .then(r=>r.text())
  .then(t=>{
    const rows=parseCSV(t);
    allData=rows.slice(1).map(r=>({
      date:r[0],
      time:r[1],
      type:r[2],
      place:r[3],
      memo:r[4],
      img:r[5]
    }));

    renderMap();
  });
}

function renderMap(){
  let html='<div class="album-grid">';

  allData.forEach(item=>{
    if(!item.place) return;

    html+=`
    <div class="album-card">
      <div class="album-thumb">
        ${
          item.img
          ? `<img src="${item.img}">`
          : getIcon(item.type||"")
        }
      </div>

      <div class="album-body">
        <div class="album-meta">
          ${item.date||""} · ${item.time||""}
        </div>

        <div class="album-title">${item.place}</div>

        <div class="album-desc">
          ${item.memo||""}
        </div>

        <div class="actions">
          <a class="btn" href="${placeView(item.place)}" target="_blank">장소보기</a>
          <a class="btn sub" href="${placeSearch(item.place)}" target="_blank">검색</a>
        </div>
      </div>
    </div>
    `;
  });

  html+='</div>';
  document.getElementById("mapList").innerHTML=html;
}

load();
</script>

</body>
</html>

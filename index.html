<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강릉여행 시간표</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef9ff}
.header{background:linear-gradient(135deg,#60c8f8,#b9efff);color:white;padding:28px 18px 32px;border-radius:0 0 30px 30px;text-align:center}
.wrap{max-width:760px;margin:auto;padding:18px}
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.tab{border:0;border-radius:16px;padding:12px;background:white;color:#168ac3;font-weight:900}
.tab.active{background:#38bdf2;color:white}
.page{display:none}
.page.active{display:block}
.day-title{margin:24px 0 14px;padding:10px 14px;background:#4bb8ec;color:white;border-radius:999px;display:inline-block;font-weight:900}
.timeline{position:relative;padding-left:22px}
.timeline:before{content:"";position:absolute;left:7px;top:0;bottom:0;width:3px;background:#9ddfff}
.card{position:relative;background:white;border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(60,160,210,.18)}
.top{display:flex;justify-content:space-between}
.time{font-size:20px;font-weight:900;color:#168ac3}
.type{font-size:12px;background:#e7f8ff;color:#168ac3;padding:5px 9px;border-radius:999px;font-weight:900}
.place{margin:10px 0 6px;font-size:18px;font-weight:900}
.memo{font-size:14px;color:#456}
.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.btn{display:block;text-align:center;text-decoration:none;background:#03c75a;color:white;padding:11px;border-radius:14px;font-weight:900;font-size:13px}
.btn.sub{background:#eafaf1;color:#03c75a}
.btn.check{background:#fff3b0;color:#7a5b00}
.btn.checked{background:#b8f2d0;color:#087a3a}
.inputbox{width:100%;padding:13px;border-radius:14px;border:1px solid #bfeaff;margin-bottom:10px}
textarea.inputbox{min-height:90px}
.loading,.empty{text-align:center;padding:40px;color:#3996c4;font-weight:900}
</style>
</head>

<body>

<div class="header">
  <h1>강릉여행 시간표 🌊</h1>
</div>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="showPage('schedule',this)">시간표</button>
    <button class="tab" onclick="showPage('maps',this)">지도</button>
    <button class="tab" onclick="showPage('memo',this)">메모</button>
  </div>

  <div id="schedule" class="page active">
    <div id="app" class="loading">불러오는 중...</div>
  </div>

  <div id="maps" class="page">
    <div id="mapList" class="loading">불러오는 중...</div>
  </div>

  <div id="memo" class="page">
    <input id="memoName" class="inputbox" placeholder="이름">
    <textarea id="memoText" class="inputbox" placeholder="메모 입력"></textarea>
    <button class="btn" onclick="saveMemo()">저장</button>
    <div id="savedMemo" class="card"></div>
  </div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmRUaGP5Z7-onrAOIWTONSfiLi2hjdOAUjObYskf2vs5oKNDj-8D2j5Rsmzj6QrLisXVktZMJsPwvW/pub?gid=0&single=true&output=csv";

let allData=[];

function showPage(id,btn){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  btn.classList.add("active");
}

function parseCSV(text){
  return text.trim().split("\n").map(r=>r.split(","));
}

function naverMap(place){
  return "https://search.naver.com/search.naver?query=" + encodeURIComponent(place + " 지도");
}
function naverRoute(place){
  return "https://search.naver.com/search.naver?query=" + encodeURIComponent(place + " 길찾기");
}
function naverSearch(place){
  return "https://search.naver.com/search.naver?query=" + encodeURIComponent(place);
}

function isChecked(key){
  return localStorage.getItem(key)==="Y";
}

function toggleCheck(key,btn){
  const v=isChecked(key);
  localStorage.setItem(key, v?"N":"Y");
  btn.classList.toggle("checked",!v);
  btn.textContent=!v?"완료":"체크";
}

function load(){
  fetch(SHEET_URL+"&t="+Date.now())
  .then(r=>r.text())
  .then(t=>{
    const rows=parseCSV(t);
    allData=rows.slice(1);

    renderSchedule();
    renderMapList();
    loadMemo();
  });
}

function renderSchedule(){
  let html="",last="";
  allData.forEach(r=>{
    const [date,time,type,place,memo]=r;

    if(date!==last){
      if(last) html+="</div>";
      last=date;
      html+=`<div class="day-title">${date}</div><div class="timeline">`;
    }

    const key=date+time+place;
    const checked=isChecked(key);

    html+=`
    <div class="card">
      <div class="top">
        <div class="time">${time||"미정"}</div>
        <div class="type">${type||""}</div>
      </div>
      <div class="place">${place||""}</div>
      <div class="memo">${memo||""}</div>
      <div class="actions">
        <a class="btn" href="${naverMap(place)}" target="_blank">지도</a>
        <a class="btn sub" href="${naverRoute(place)}" target="_blank">길찾기</a>
        <button class="btn check ${checked?"checked":""}" onclick="toggleCheck('${key}',this)">
          ${checked?"완료":"체크"}
        </button>
      </div>
    </div>`;
  });
  if(html) html+="</div>";
  document.getElementById("app").innerHTML=html||"데이터 없음";
}

function renderMapList(){
  let html="";
  allData.forEach(r=>{
    const [date,time,type,place,memo]=r;
    if(!place) return;

    html+=`
    <div class="card">
      <div class="type">${date} ${time||""}</div>
      <div class="place">${place}</div>
      <div class="actions">
        <a class="btn" href="${naverMap(place)}" target="_blank">지도</a>
        <a class="btn sub" href="${naverRoute(place)}" target="_blank">길찾기</a>
        <a class="btn sub" href="${naverSearch(place)}" target="_blank">검색</a>
      </div>
    </div>`;
  });
  document.getElementById("mapList").innerHTML=html||"장소 없음";
}

function saveMemo(){
  localStorage.setItem("memo_name",document.getElementById("memoName").value);
  localStorage.setItem("memo_text",document.getElementById("memoText").value);
  loadMemo();
}

function loadMemo(){
  const n=localStorage.getItem("memo_name")||"";
  const t=localStorage.getItem("memo_text")||"";
  document.getElementById("memoName").value=n;
  document.getElementById("memoText").value=t;
  document.getElementById("savedMemo").innerHTML=t?`<b>${n}</b><div>${t}</div>`:"메모 없음";
}

load();
setInterval(load,30000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강릉여행 시간표</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#eef9ff;
  color:#123;
}

.header{
  background:linear-gradient(135deg,#64c7f7,#9ee7ff);
  color:white;
  padding:28px 18px 34px;
  border-radius:0 0 30px 30px;
  text-align:center;
  box-shadow:0 6px 18px rgba(0,120,180,.2);
}

.wrap{
  max-width:760px;
  margin:auto;
  padding:18px;
}

.day-title{
  margin:26px 0 14px;
  padding:10px 14px;
  background:#4bb8ec;
  color:white;
  border-radius:999px;
  display:inline-block;
  font-weight:800;
}

.timeline{
  position:relative;
  padding-left:22px;
}

.timeline::before{
  content:"";
  position:absolute;
  left:7px;
  top:0;
  bottom:0;
  width:3px;
  background:#9ddfff;
  border-radius:10px;
}

.card{
  position:relative;
  background:white;
  border-radius:20px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 6px 18px rgba(60,160,210,.18);
  border:1px solid #d9f3ff;
}

.card::before{
  content:"";
  position:absolute;
  left:-21px;
  top:22px;
  width:13px;
  height:13px;
  background:#31aeea;
  border:3px solid white;
  border-radius:50%;
  box-shadow:0 0 0 3px #bcecff;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.time{
  font-size:20px;
  font-weight:900;
  color:#168ac3;
}

.type{
  font-size:12px;
  background:#e7f8ff;
  color:#168ac3;
  padding:5px 9px;
  border-radius:999px;
  font-weight:800;
}

.place{
  margin:10px 0 6px;
  font-size:18px;
  font-weight:900;
}

.memo{
  font-size:14px;
  line-height:1.6;
  color:#456;
}

.actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}

.btn{
  flex:1;
  text-align:center;
  text-decoration:none;
  background:#03c75a;
  color:white;
  padding:11px;
  border-radius:14px;
  font-weight:800;
  font-size:14px;
}

.btn.sub{
  background:#eafaf1;
  color:#03c75a;
}

.loading,.empty{
  text-align:center;
  padding:40px 10px;
  color:#3996c4;
  font-weight:800;
}
</style>
</head>

<body>

<div class="header">
  <h1>강릉여행 시간표 🌊</h1>
</div>

<div class="wrap" id="app">
  <div class="loading">불러오는 중...</div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmRUaGP5Z7-onrAOIWTONSfiLi2hjdOAUjObYskf2vs5oKNDj-8D2j5Rsmzj6QrLisXVktZMJsPwvW/pub?gid=0&single=true&output=csv";

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let quote = false;

  for(let i=0; i<text.length; i++){
    const char = text[i];
    const next = text[i+1];

    if(char === '"' && quote && next === '"'){
      cell += '"';
      i++;
    }else if(char === '"'){
      quote = !quote;
    }else if(char === "," && !quote){
      row.push(cell.trim());
      cell = "";
    }else if((char === "\n" || char === "\r") && !quote){
      if(cell || row.length){
        row.push(cell.trim());
        rows.push(row);
        row = [];
        cell = "";
      }
    }else{
      cell += char;
    }
  }

  if(cell || row.length){
    row.push(cell.trim());
    rows.push(row);
  }

  return rows;
}

function makeMapLink(place, mapLink){
  if(mapLink) return mapLink;
  return "https://map.naver.com/v5/search/" + encodeURIComponent(place);
}

function makeSearchLink(place){
  return "https://search.naver.com/search.naver?query=" + encodeURIComponent(place);
}

function load(){
  fetch(SHEET_URL + "&t=" + Date.now())
    .then(res => res.text())
    .then(text => {
      const rows = parseCSV(text);
      const data = rows.slice(1);

      let html = "";
      let currentDate = "";

      data.forEach(r => {
        const date = r[0] || "";
        const time = r[1] || "";
        const type = r[2] || "";
        const place = r[3] || "";
        const memo = r[4] || "";
        const mapLink = r[5] || "";

        if(!date && !place) return;

        if(date !== currentDate){
          currentDate = date;
          html += `<div class="day-title">${date}</div><div class="timeline">`;
        }

        const finalMap = makeMapLink(place, mapLink);
        const finalSearch = makeSearchLink(place);

        html += `
          <div class="card">
            <div class="top">
              <div class="time">${time || "시간 미정"}</div>
              <div class="type">${type || "일정"}</div>
            </div>

            <div class="place">${place || "장소 미정"}</div>
            <div class="memo">${memo || ""}</div>

            <div class="actions">
              <a class="btn" href="${finalMap}" target="_blank">네이버지도</a>
              <a class="btn sub" href="${finalSearch}" target="_blank">네이버검색</a>
            </div>
          </div>
        `;
      });

      if(html){
        html += `</div>`;
      }

      document.getElementById("app").innerHTML = html || `<div class="empty">일정 없음</div>`;
    })
    .catch(()=>{
      document.getElementById("app").innerHTML = `<div class="empty">불러오기 실패</div>`;
    });
}

load();
setInterval(load, 30000);
</script>

</body>
</html>

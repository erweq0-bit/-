<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강릉여행계획</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#bacee0;
}
.header{
  background:#ffe812;
  padding:16px;
  text-align:center;
  font-weight:800;
}
.wrap{
  max-width:720px;
  margin:auto;
  padding:16px;
}
.chat{
  display:flex;
  gap:8px;
  margin-bottom:12px;
}
.profile{
  width:36px;
  height:36px;
  border-radius:12px;
  background:#ffe812;
  display:flex;
  align-items:center;
  justify-content:center;
}
.bubble{
  background:white;
  padding:12px;
  border-radius:12px;
}
.time{font-size:12px;color:#666}
.title{font-weight:800}
.memo{font-size:14px}
.day{
  text-align:center;
  margin:20px 0 10px;
}
.day span{
  background:#999;
  color:white;
  padding:4px 10px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="header">강릉여행계획 💬</div>
<div class="wrap" id="app">불러오는 중...</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmRUaGP5Z7-onrAOIWTONSfiLi2hjdOAUjObYskf2vs5oKNDj-8D2j5Rsmzj6QrLisXVktZMJsPwvW/pub?gid=0&single=true&output=csv";

function parseCSV(text){
  return text.split("\n").map(row => row.split(","));
}

function load(){
  fetch(SHEET_URL + "&t=" + Date.now())
  .then(res=>res.text())
  .then(text=>{
    const rows=parseCSV(text);
    const header=rows[0];

    let html="";
    let lastDate="";

    rows.slice(1).forEach(r=>{
      if(!r[0]) return;

      const date=r[0];
      const time=r[1];
      const title=r[2];
      const memo=r[3];

      if(date!==lastDate){
        html+=`<div class="day"><span>${date}</span></div>`;
        lastDate=date;
      }

      html+=`
      <div class="chat">
        <div class="profile">🌊</div>
        <div class="bubble">
          <div class="time">${time}</div>
          <div class="title">${title}</div>
          <div class="memo">${memo||""}</div>
        </div>
      </div>
      `;
    });

    document.getElementById("app").innerHTML=html;
  });
}

load();
setInterval(load, 30000);
</script>

</body>
</html>

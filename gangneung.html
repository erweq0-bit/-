<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강릉여행계획</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f4f8fb;
}
header {
  background:#0ea5e9;
  color:white;
  padding:30px;
  text-align:center;
}
.container {
  max-width:600px;
  margin:auto;
  padding:20px;
}
.card {
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.time {
  color:#0ea5e9;
  font-weight:bold;
}
</style>

</head>
<body>

<header>
  <h1>강릉 여행 계획</h1>
</header>

<div class="container" id="app">
  불러오는 중...
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1raOzKEyZNqrCmItRLi-LpsXWEhV582G8yeti8j_KzYQ/edit?usp=sharing"

async function loadData(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();
    const rows = text.split("\\n").slice(1);

    let html = "";

    rows.forEach(row=>{
      const cols = row.split(",");
      if(cols.length < 3) return;

      html += `
      <div class="card">
        <div class="time">${cols[1]}</div>
        <div><b>${cols[2]}</b></div>
        <div>${cols[3] || ""}</div>
      </div>
      `;
    });

    document.getElementById("app").innerHTML = html;

  }catch(e){
    document.getElementById("app").innerHTML = "데이터 불러오기 실패";
  }
}

loadData();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강릉여행계획</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#bacee0;
  color:#222;
}
.header{
  position:sticky;
  top:0;
  z-index:10;
  background:#ffe812;
  padding:16px;
  text-align:center;
  font-weight:800;
  box-shadow:0 2px 8px rgba(0,0,0,.08);
}
.wrap{
  max-width:720px;
  margin:0 auto;
  padding:16px;
}
.notice{
  background:rgba(255,255,255,.55);
  border-radius:16px;
  padding:12px;
  font-size:13px;
  margin-bottom:16px;
}
.day{
  margin:24px 0 12px;
  text-align:center;
}
.day span{
  display:inline-block;
  background:rgba(0,0,0,.18);
  color:white;
  font-size:13px;
  padding:6px 12px;
  border-radius:999px;
}
.chat{
  display:flex;
  gap:8px;
  margin-bottom:14px;
}
.profile{
  width:38px;
  height:38px;
  border-radius:14px;
  background:#ffe812;
  display:flex;
  align-items:center;
  justify-content:center;
  flex:none;
  font-size:20px;
}
.bubble-area{
  max-width:78%;
}
.name{
  font-size:12px;
  margin:0 0 4px 2px;
  color:#344;
}
.bubble{
  background:white;
  border-radius:4px 18px 18px 18px;
  padding:12px 14px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.time{
  font-size:13px;
  font-weight:800;
  color:#666;
  margin-bottom:4px;
}
.title{
  font-size:16px;
  font-weight:900;
  margin-bottom:6px;
}
.memo{
  font-size:14px;
  line-height:1.45;
  color:#444;
  white-space:pre-line;
}
.tag{
  display:inline-block;
  margin-top:8px;
  background:#ffe812;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
  font-weight:800;
}
.extra{
  margin-top:8px;
  padding-top:8px;
  border-top:1px dashed #ddd;
  font-size:12px;
  color:#666;
}
.status{
  text-align:center;
  font-size:12px;
  color:#4b5563;
  margin:18px 0;
}
.error{
  background:white;
  color:#d00;
  border-radius:16px;
  padding:16px;
}
</style>
</head>

<body>

<div class="header">강릉여행계획 💬</div>

<div class="wrap">
  <div class="notice">
    구글시트 수정 시 약 30초마다 자동으로 새로고침됩니다.
  </div>

  <div id="app">불러오는 중...</div>
  <div id="status" class="status"></div>
</div>

<script>
/* ✅ 여기에 구글시트 CSV 링크 붙여넣기 */
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTmRUaGP5Z7-onrAOIWTONSfiLi2hjdOAUjObYskf2vs5oKNDj-8D2j5Rsmzj6QrLisXVktZMJsPwvW/pub?gid=0&single=true&output=csv";

/* ✅ 자동 갱신 시간: 10초 */
const REFRESH_SECONDS = 10;

function parseCSV(text){
  const rows=[];
  let row=[], cell="", quote=false;

  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];

    if(c === '"' && quote && n === '"'){
      cell += '"';
      i++;
    } else if(c === '"'){
      quote = !quote;
    } else if(c === "," && !quote){
      row.push(cell.trim());
      cell="";
    } else if((c === "\n" || c === "\r") && !quote){
      if(cell || row.length){
        row.push(cell.trim());
        rows.push(row);
        row=[];
        cell="";
      }
      if(c === "\r" && n === "\n") i++;
    } else {
      cell += c;
    }
  }

  if(cell || row.length){
    row.push(cell.trim());
    rows.push(row);
  }

  return rows;
}

function getValue(obj, names){
  for(const name of names){
    if(obj[name] !== undefined && obj[name] !== "") return obj[name];
  }
  return "";
}

function escapeHTML(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function normalizeTime(t){
  if(!t) return "99:99";
  t = String(t).trim();
  if(/^\d{1,2}:\d{2}$/.test(t)){
    const [h,m]=t.split(":");
    return h.padStart(2,"0")+":"+m;
  }
  return t;
}

async function loadSheet(){
  const app=document.getElementById("app");
  const status=document.getElementById("status");

  if(!SHEET_URL || SHEET_URL.includes("여기에_구글시트")){
    app.innerHTML = `
      <div class="error">
        아직 구글시트 CSV 링크가 연결되지 않았습니다.<br>
        코드 안의 SHEET_URL 부분에 링크를 붙여넣어 주세요.
      </div>
    `;
    return;
  }

  try{
    const url = SHEET_URL + (SHEET_URL.includes("?") ? "&" : "?") + "v=" + Date.now();
    const res = await fetch(url);
    const text = await res.text();

    const rows=parseCSV(text);
    const headers=rows[0].map(h=>h.trim());
    const data=rows.slice(1).filter(r=>r.some(v=>v.trim() !== "")).map(r=>{
      const obj={};
      headers.forEach((h,i)=>obj[h]=r[i] || "");
      return obj;
    });

    data.sort((a,b)=>{
      const da=getValue(a,["날짜","date","Date"]);
      const db=getValue(b,["날짜","date","Date"]);
      if(da !== db) return da.localeCompare(db,"ko",{numeric:true});
      return normalizeTime(getValue(a,["시간","time","Time"])).localeCompare(
        normalizeTime(getValue(b,["시간","time","Time"]))
      );
    });

    let currentDate="";
    let html="";

    data.forEach(item=>{
      const date=getValue(item,["날짜","date","Date"]) || "날짜 미정";
      const time=getValue(item,["시간","time","Time"]);
      const title=getValue(item,["제목","title","Title","장소","place","내용"]) || "일정";
      const memo=getValue(item,["메모","memo","Memo","설명","desc","description"]);
      const tag=getValue(item,["태그","tag","Tag","분류"]);

      if(date !== currentDate){
        currentDate=date;
        html += `<div class="day"><span>${escapeHTML(date)}</span></div>`;
      }

      const used=["날짜","date","Date","시간","time","Time","제목","title","Title","장소","place","내용","메모","memo","Memo","설명","desc","description","태그","tag","Tag","분류"];
      const extras=Object.entries(item)
        .filter(([k,v])=>v && !used.includes(k))
        .map(([k,v])=>`<div><b>${escapeHTML(k)}</b>: ${escapeHTML(v)}</div>`)
        .join("");

      html += `
        <div class="chat">
          <div class="profile">🌊</div>
          <div class="bubble-area">
            <div class="name">강릉 일정</div>
            <div class="bubble">
              ${time ? `<div class="time">${escapeHTML(time)}</div>` : ""}
              <div class="title">${escapeHTML(title)}</div>
              ${memo ? `<div class="memo">${escapeHTML(memo)}</div>` : ""}
              ${tag ? `<div class="tag">#${escapeHTML(tag)}</div>` : ""}
              ${extras ? `<div class="extra">${extras}</div>` : ""}
            </div>
          </div>
        </div>
      `;
    });

    app.innerHTML = html || "등록된 일정이 없습니다.";
    status.textContent = "마지막 업데이트: " + new Date().toLocaleTimeString();

  }catch(e){
    app.innerHTML = `<div class="error">구글시트를 불러오지 못했습니다. CSV 링크를 확인해 주세요.</div>`;
  }
}

loadSheet();
setInterval(loadSheet, REFRESH_SECONDS * 1000);
</script>

</body>
</html>
